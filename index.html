<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Your Dashboard</h1>
  </header>

  <main>
    <h2 id="username"></h2>
    <p>Email: <span id="email"></span></p>
    <p>Cashback Balance: ₹<span id="cashback"></span></p>

    <h3>Cashback History</h3>
    <table border="1">
      <thead>
        <tr>
          <th>Store</th>
          <th>Amount</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </main>

  <script>
    const userId = "replace_with_real_user_id";

    fetch(`/user/${userId}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('username').innerText = data.username;
        document.getElementById('email').innerText = data.email;
        document.getElementById('cashback').innerText = data.cashback;
      });

    fetch(`/history/${userId}`)
      .then(res => res.json())
      .then(data => {
        const table = document.getElementById('history');
        data.forEach(tx => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${tx.store}</td>
            <td>₹${tx.amount}</td>
            <td>${new Date(tx.date).toLocaleDateString()}</td>
          `;
          table.appendChild(row);
        });
      });
  </script>
</body>
</html>
